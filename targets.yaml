model:
  slug_stem: "SurgeBoard"
  gift_id: 5832497899283415733

probe:
  hole_tolerance: 5          # consecutive missing slugs that mark the ceiling

intervals:
  coarse_sec: 60
  mid_sec: 10
  tight_sec: 1.5

zones:
  mid_at: 400                # issue >= mid_at → mid_sec polling
  tight_lead: 4              # issue >= target - tight_lead → tight_sec polling

targets:
  - num: 444
    ammo_index: 0
  - num: 666
    ammo_index: 1

runtime:
  armed: false               # set to true only when ready to fire (or ARM via dashboard)
